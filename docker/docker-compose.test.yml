# ephemeral postgres for the integration test tier
# mirrors the ci service container so local runs match ci exactly
#
#   docker compose -f docker/docker-compose.test.yml up -d
#   export TEST_DATABASE_URL=postgresql+asyncpg://events_bot:events_bot@localhost:5432/events_bot
#   (cd backend && DATABASE_URL="$TEST_DATABASE_URL" .venv/bin/alembic -c alembic.ini upgrade head)
#   (cd backend && TEST_DATABASE_URL="$TEST_DATABASE_URL" .venv/bin/pytest ../tests/integration)
#   docker compose -f docker/docker-compose.test.yml down -v
#
# data lives in a tmpfs so a fresh up is always clean
services:
  test-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: events_bot
      POSTGRES_PASSWORD: events_bot
      POSTGRES_DB: events_bot
    ports:
      - "5432:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U events_bot"]
      interval: 3s
      timeout: 3s
      retries: 20
