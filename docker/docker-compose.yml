services:
  postgres:
    image: postgres:16-alpine
    container_name: events_bot_postgres
    environment:
      POSTGRES_DB: events_bot
      POSTGRES_USER: events_bot
      # POSTGRES_PASSWORD must be set in .env — never commit a real password here
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    ports:
      - "127.0.0.1:54320:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U events_bot -d events_bot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: events_bot_redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: events_bot_app
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://events_bot:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/events_bot
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: events_bot_web
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://events_bot:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/events_bot
      REDIS_URL: redis://redis:6379/0
    command: ["uvicorn", "app.web.main:web_app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "127.0.0.1:8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
